[dependency_sets]
aws-runtime = ["skaal[aws]"]
aws-wsgi = ["mangum>=0.17"]
gcp-runtime = ["skaal[gcp]"]
gcp-wsgi = ["gunicorn>=22.0"]
local-compose = ["skaal", "gunicorn>=22.0", "apscheduler>=3.10"]
local-asgi = ["uvicorn[standard]>=0.29", "starlette>=0.36"]
mesh-runtime = ["skaal-mesh"]
sqlite-driver = ["aiosqlite"]
redis-runtime = ["redis>=5.0"]
postgres-asyncpg = ["asyncpg>=0.29"]
cloud-sql-connector = ["cloud-sql-python-connector[asyncpg]>=1.9"]
chroma-runtime = ["langchain-chroma>=1.1", "chromadb>=1.5"]
pgvector-runtime = ["langchain-postgres>=0.0.17", "psycopg[binary]>=3.3"]
