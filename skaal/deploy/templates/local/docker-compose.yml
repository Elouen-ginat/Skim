version: '3.8'

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skaal-app
    ports:
      - "${port}:8000"
    environment:
${service_env_vars}
    depends_on:
${service_dependencies}
    volumes:
      # Mount the source package from the project root for live reload during development
      - ../${source_pkg}:/app/${source_pkg}
      # Named volume for SQLite and other file-backed storage; persists across container restarts
      - skaal_data:/app/data
    command: uv run gunicorn --bind 0.0.0.0:8000 --workers 1 --timeout 120$gunicorn_worker --reload main:application  # 1 worker: scheduler must run once
${app_labels}
${additional_services}
volumes:
  skaal_data:
