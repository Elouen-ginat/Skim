[build-system]
requires = ["setuptools>=68", "maturin>=1.4"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "skaal"
version = "0.1.0"
description = "Infrastructure as Constraints — write it once, scale it with a word."
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = [
    "z3-solver>=4.12",
    "pydantic>=2.0",
    "typer>=0.12",
    "tomllib; python_version < '3.11'",
    "redis>=5.0",
    "aiosqlite>=0.19",
]

[project.optional-dependencies]
aws = [
    "boto3>=1.34",
    "pulumi>=3.0",
    "pulumi-aws>=6.0",
    "asyncpg>=0.29",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "maturin>=1.4",
]

[project.scripts]
skaal = "skaal.cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["skaal*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
