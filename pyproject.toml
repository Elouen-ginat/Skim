[build-system]
requires = ["hatchling", "maturin>=1.4"]
build-backend = "hatchling.build"

[project]
name = "skaal"
version = "0.1.0"
description = "Infrastructure as Constraints — write it once, scale it with a word."
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = [
    "z3-solver>=4.12",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "typer>=0.12",
    "rich>=13.0",
    "tomllib; python_version < '3.11'",
    "redis>=5.0",
    "aiosqlite>=0.19",
    "uvicorn>=0.29",
    "starlette>=0.34",
]

[dependency-groups]
aws = [
    "boto3>=1.34",
    "pulumi>=3.0",
    "pulumi-aws>=6.0",
    "asyncpg>=0.29",
]
gcp = [
    "google-cloud-firestore>=2.16",
    "google-cloud-storage>=2.16",
    "asyncpg>=0.29",
    "cloud-sql-python-connector[asyncpg]>=1.9",
    "pulumi>=3.0",
    "pulumi-gcp>=7.0",
    "uvicorn>=0.29",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.8",
    "hatchling",
    "maturin>=1.4",
]
examples = [
    "dash",
    "fastapi",
    "dash-bootstrap-components>=1.0",
]

[project.scripts]
skaal = "skaal.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["skaal"]
# Include non-Python template files (Dockerfile, Pulumi.yaml, etc.)
artifacts = [
    "skaal/deploy/templates/**",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

# ── Skaal project defaults ────────────────────────────────────────────────────
# All fields are optional. CLI flags and SKAAL_* env vars take precedence.
#
# [tool.skaal]
# app         = "mypackage.app:skaal_app"  # default MODULE:APP for run/plan/build
# target      = "aws"                       # aws | gcp
# region      = "us-east-1"
# out         = "artifacts"                 # artifact output directory
# catalog     = "catalogs/aws.toml"         # path to catalog TOML
# stack       = "dev"                       # Pulumi stack name
# gcp_project = "my-gcp-project"            # GCP only
