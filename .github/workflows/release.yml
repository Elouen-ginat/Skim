name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify distributions
        run: |
          ls -lh dist/
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-mesh-wheels:
    name: Build mesh wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Build skaal-mesh wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: mesh
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --interpreter 3.11 3.12 3.13

      - name: Upload mesh wheels
        uses: actions/upload-artifact@v4
        with:
          name: mesh-${{ matrix.target }}
          path: mesh/dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skaal
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mesh-pypi:
    name: Publish skaal-mesh to PyPI
    needs: build-mesh-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skaal-mesh
    permissions:
      id-token: write
    steps:
      - name: Download mesh wheels
        uses: actions/download-artifact@v4
        with:
          pattern: mesh-*
          path: dist/mesh/
          merge-multiple: true

      - name: Verify mesh wheels
        run: |
          ls -lh dist/mesh/
          python -m pip install twine
          python -m twine check dist/mesh/*

      - name: Publish mesh wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mesh/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/skaal
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-mesh-testpypi:
    name: Publish skaal-mesh to TestPyPI
    needs: build-mesh-wheels
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/skaal-mesh
    permissions:
      id-token: write
    steps:
      - name: Download mesh wheels
        uses: actions/download-artifact@v4
        with:
          pattern: mesh-*
          path: dist/mesh/
          merge-multiple: true

      - name: Verify mesh wheels
        run: |
          ls -lh dist/mesh/
          python -m pip install twine
          python -m twine check dist/mesh/*

      - name: Publish mesh wheels to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mesh/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  create-github-release:
    name: Create GitHub Release
    needs:
      - publish-pypi
      - publish-mesh-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download mesh wheels
        uses: actions/download-artifact@v4
        with:
          pattern: mesh-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
