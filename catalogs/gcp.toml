# Skim Infrastructure Catalog — Google Cloud Platform
# Loaded by the Z3 solver during `skim plan`.

[storage.memorystore-redis]
display_name = "Cloud Memorystore (Redis)"
read_latency  = { min = 0.1, max = 2.0, unit = "ms" }
write_latency = { min = 0.1, max = 5.0, unit = "ms" }
durability    = ["ephemeral", "persistent"]
max_size_gb   = 300
access_patterns = ["random-read", "random-write", "pub-sub"]
cost_per_gb_month = 3.20
regions = ["all"]

[storage.memorystore-redis.deploy]
redis_version  = "REDIS_7_0"
tier           = "BASIC"
memory_size_gb = 1

[storage.cloud-sql-postgres]
display_name = "Cloud SQL (PostgreSQL 16)"
read_latency  = { min = 1.0, max = 50.0, unit = "ms" }
write_latency = { min = 2.0, max = 100.0, unit = "ms" }
durability    = ["persistent", "durable"]
max_size_gb   = 30_720
access_patterns = ["random-read", "sequential", "transactional"]
cost_per_gb_month = 0.17
regions = ["all"]

[storage.cloud-sql-postgres.deploy]
database_version    = "POSTGRES_16"
tier                = "db-f1-micro"
backup_enabled      = true
deletion_protection = false

[storage.gcs]
display_name = "Google Cloud Storage"
read_latency  = { min = 50, max = 500, unit = "ms" }
write_latency = { min = 100, max = 2000, unit = "ms" }
durability    = ["durable"]
max_size_gb   = 0
access_patterns = ["append-only", "bulk-read"]
cost_per_gb_month = 0.020
regions = ["all"]

[storage.firestore]
display_name = "Cloud Firestore"
read_latency  = { min = 5.0, max = 50.0, unit = "ms" }
write_latency = { min = 5.0, max = 50.0, unit = "ms" }
durability    = ["durable"]
max_size_gb   = 0
access_patterns = ["random-read", "random-write"]
cost_per_gb_month = 0.18
regions = ["all"]
notes = "Document store; eventual or strong consistency selectable"

[storage.pubsub]
display_name = "Cloud Pub/Sub"
read_latency  = { min = 5.0, max = 30.0, unit = "ms" }
write_latency = { min = 5.0, max = 30.0, unit = "ms" }
durability    = ["durable"]
max_size_gb   = 0
access_patterns = ["pub-sub", "append-only"]
cost_per_gb_month = 0.04
regions = ["all"]
notes = "Preferred for pub-sub access pattern when residency requires GCP"

# ── Compute ────────────────────────────────────────────────────────────────

[compute.n2-standard-2]
