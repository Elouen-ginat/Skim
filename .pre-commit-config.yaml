repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(skaal/deploy/templates/|\.git)'
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
        exclude: '^skaal/deploy/templates/'
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
        exclude: '^skaal/deploy/templates/'
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python formatting (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [--fix]
        exclude: '^skaal/deploy/templates/'
      - id: ruff-format
        stages: [pre-commit]
        exclude: '^skaal/deploy/templates/'

  # Type checking (MyPy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - z3-solver>=4.12
        args: [--ignore-missing-imports]
        exclude: ^(tests/|examples/|skaal/deploy/templates/)

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: '^skaal/deploy/templates/|^artifacts/'

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        additional_dependencies: [pbr]
        args: [--severity-level=medium]
        exclude: ^(tests/|skaal/deploy/templates/)

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes for pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy]  # MyPy can be slow, skip in CI if desired
  submodules: false
